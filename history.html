<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaction History</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

header{
background:#0a7cff;
color:white;
padding:20px;
font-size:24px;
}

.transaction{
background:white;
margin:10px auto;
padding:10px;
width:80%;
border-radius:5px;
}

button{
padding:10px 20px;
margin-top:20px;
background:#0a7cff;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<header>Transaction History</header>

<div id="history"></div>

<button onclick="back()">Back</button>

<script>

let currentUser = localStorage.getItem("currentUser");

let accounts = JSON.parse(localStorage.getItem("accounts")) || {};

let container = document.getElementById("history");

if(accounts[currentUser] && accounts[currentUser].history.length > 0){

accounts[currentUser].history.forEach(function(item){

let div = document.createElement("div");

div.className = "transaction";

div.innerText = item;

container.appendChild(div);

});

}else{

container.innerHTML = "<p>No transactions yet</p>";

}

function back(){

window.location.href = "dashboard.html";

}

</script>

</body>
</html>
