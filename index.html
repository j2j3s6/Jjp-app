<!DOCTYPE html>
<html>
<head>
<title>Login - JJP Microfinance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
margin-top:100px;
}

input{
padding:10px;
margin:10px;
width:200px;
}

button{
padding:10px 20px;
background:#0a7cff;
color:white;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<h2>JJP Microfinance Login</h2>

<input type="text" id="username" placeholder="Username"><br>

<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<script>

function login(){

let let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

if(user === "admin" && pass === "1234"){
window.location.href = "dashboard.html";
}
else{
alert("Invalid login details");
}

}

</script>

</body>
</html>
