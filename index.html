<!DOCTYPE html>
<html>
<head>
<title>JJP Microfinance Login</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:100px;
background:#f2f2f2;
}

input{
display:block;
margin:10px auto;
padding:10px;
width:200px;
}

button{
padding:10px 20px;
background:#0a7cff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<h2>JJP Microfinance Login</h2>

<input type="text" id="username" placeholder="Enter Username">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<script>

function login(){

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

if(user === "admin" && pass === "1234"){
window.location.href = "dashboard.html";
}
else{
alert("Invalid login details");
}

}

</script>

</body>
</html>
