<!DOCTYPE html>
<html>
<head>
<title>JJP Microfinance</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
margin:0;
padding:0;
}

header{
background:#0a7cff;
color:white;
padding:20px;
font-size:24px;
}

.container{
margin-top:40px;
}
<div class="balance">
<h2>Your Balance</h2>
<h3 id="balance">₦10000</h3>
</div>
<button onclick="sendMoney()">Send Money</button>

<button onclick="location.href='receive.html'">Receive Money</button>
<br>

<button onclick="location.href='loan.html'">Request Loan</button>
<br>

<button onclick="location.href='history.html'">Transaction History</button>
<script>

let balance = 10000;

function updateBalance(){
document.getElementById("balance").innerText = "₦" + balance;
}

function sendMoney(){
let amount = prompt("Enter amount to send:");

if(amount <= balance){
balance = balance - amount;
updateBalance();
alert("Money sent successfully");
}
else{
alert("Insufficient balance");
}

}

</script>
