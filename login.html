<!DOCTYPE html>
<html>
<head>
<title>JJP Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding-top:80px;
}

.login-box{
background:white;
padding:30px;
margin:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

input{
width:80%;
padding:12px;
margin:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:85%;
padding:12px;
background:#0a7cff;
color:white;
border:none;
border-radius:6px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>JJP Microfinance Login</h2>

<input type="text" placeholder="Username">

<br>

<input type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

</div>

<script>

function login(){

window.location.href = "index.html";

}

</script>

</body>
</html>
