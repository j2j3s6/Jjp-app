<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f2f2;
text-align:center;
margin:0;
}

header{
background:#0a7cff;
color:white;
padding:20px;
font-size:24px;
}

.balance{
margin-top:30px;
font-size:22px;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:5px;
background:#0a7cff;
color:white;
cursor:pointer;
}

button:hover{
background:#084dbf;
}

</style>

</head>

<body>

<header>JJP Microfinance</header>

<div class="balance">
<h2>Your Balance</h2>
<h3 id="balance">₦0</h3>
</div>

<button onclick="sendMoney()">Send Money</button>

<button onclick="receiveMoney()">Receive Money</button>

<br>

<button onclick="location.href='history.html'">Transaction History</button>

<br><br>

<button onclick="logout()">Logout</button>

<script>

let currentUser = localStorage.getItem("currentUser");

if(!currentUser){
window.location.href = "index.html";
}

let accounts = JSON.parse(localStorage.getItem("accounts")) || {};

if(!accounts[currentUser]){
accounts[currentUser] = {
balance:10000,
history:[]
};
}

updateBalance();

function updateBalance(){

document.getElementById("balance").innerText =
"₦" + accounts[currentUser].balance;

localStorage.setItem("accounts", JSON.stringify(accounts));

}

function sendMoney(){

let amount = Number(prompt("Enter amount to send"));

if(amount > 0 && amount <= accounts[currentUser].balance){

accounts[currentUser].balance -= amount;

accounts[currentUser].history.push("Sent ₦" + amount);

updateBalance();

alert("Money sent successfully");

}else{

alert("Invalid amount");

}

}

function receiveMoney(){

let amount = Number(prompt("Enter amount received"));

if(amount > 0){

accounts[currentUser].balance += amount;

accounts[currentUser].history.push("Received ₦" + amount);

updateBalance();

alert("Money received successfully");

}else{

alert("Invalid amount");

}

}

function logout(){

localStorage.removeItem("currentUser");

window.location.href = "index.html";


</script>

</body>
</html>
