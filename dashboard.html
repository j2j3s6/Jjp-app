<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JJP Microfinance Dashboard</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f2f2;
text-align:center;
margin:0;
padding:0;
}

header{
background:#0a7cff;
color:white;
padding:20px;
font-size:24px;
}

.balance{
margin-top:30px;
font-size:22px;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:5px;
background:#0a7cff;
color:white;
cursor:pointer;
}

button:hover{
background:#084dbf;
}

</style>

</head>

<body>

<header>JJP Microfinance</header>

<div class="balance">
<h2>Your Balance</h2>
<h3 id="balance">₦0</h3>
</div>

<button onclick="sendMoney()">Send Money</button>

<button onclick="receiveMoney()">Receive Money</button>

<br>

<button onclick="location.href='loan.html'">Loan</button>

<button onclick="location.href='history.html'">Transaction History</button>

<br><br>

<button onclick="logout()">Logout</button>

<script>

let balance = localStorage.getItem("balance");

if(balance === null){
balance = 10000;
localStorage.setItem("balance", balance);
}

balance = Number(balance);

updateBalance();

function updateBalance(){
document.getElementById("balance").innerText = "₦" + balance;
}

function sendMoney(){

let amount = prompt("Enter amount to send");

amount = Number(amount);

if(amount > 0 && amount <= balance){

balance = balance - amount;

localStorage.setItem("balance", balance);

updateBalance();

alert("Money sent successfully");

}else{

alert("Invalid amount or insufficient balance");

}

}

function receiveMoney(){

let amount = prompt("Enter amount received");

amount = Number(amount);

if(amount > 0){

balance = balance + amount;

localStorage.setItem("balance", balance);

updateBalance();

alert("Money received successfully");

}else{

alert("Invalid amount");

}

}

function logout(){

window.location.href = "index.html";

}

</script>

</body>
</html>
